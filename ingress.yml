apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  namespace: web
spec:
  ingressClassName: nginx
  rules:
  - host: tcc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80